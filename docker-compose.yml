services:
  db:
    image: postgres:15
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: secret
      POSTGRES_DB: mydb
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  flyway:
    image: flyway/flyway
    command: migrate
    environment:
      FLYWAY_URL: jdbc:postgresql://db:5432/mydb
      FLYWAY_USER: postgres
      FLYWAY_PASSWORD: secret
    volumes:
      - ./migrations:/flyway/sql
    depends_on:
      - db

volumes:
  postgres_data:
